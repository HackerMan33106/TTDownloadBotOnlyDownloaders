version: '3.8'

services:
  # Локальный сервер Telegram Bot API
  # Документация: https://github.com/tdlib/telegram-bot-api
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      # Получите эти данные на https://my.telegram.org/
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      # Режим 'local' позволяет работать с файлами напрямую (без скачивания) если папки примонтированы
      TELEGRAM_LOCAL: "true" 
      TELEGRAM_VERBOSITY: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"  # Внешний порт 8081 мапится на внутренний 8081

  # Ваш бот
  bot:
    build: .
    container_name: mybot
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    environment:
      # Основные настройки
      BOT_TOKEN: "${BOT_TOKEN}"
      
      # Настройки локального API (обращаемся по имени сервиса 'telegram-bot-api')
      USE_LOCAL_API: "true"
      LOCAL_API_URL: "http://telegram-bot-api:8081"
      
      # Остальные переменные из .env пробрасываются автоматически или указываются здесь
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET}"
      SPOTIFY_REFRESH_TOKEN: "${SPOTIFY_REFRESH_TOKEN}"
      DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data  # Данные бота (БД, куки)
      # Важный момент: для максимальной скорости локальный сервер и бот должны видеть одну папку
      # Но в простой конфигурации мы работаем через HTTP, поэтому volume api не обязателен для бота,
      # если мы не используем режим local-mode (прямой доступ к файлам).
      # Для упрощения пока используем HTTP-режим.
    command: ["python", "main.py"]

volumes:
  telegram-bot-api-data:
